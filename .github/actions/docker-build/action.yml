name: 'Build and Push Docker Image'
description: 'Build Docker image, tag with timestamp, and push to registry'

inputs:
  docker_repo_user:
    description: 'Docker Hub username'
    required: true
  docker_repo_password:
    description: 'Docker Hub password'
    required: true
  image_name:
    description: 'Docker image name (e.g., cyo, consulta-arca)'
    required: true
  dockerfile_path:
    description: 'Path to Dockerfile'
    default: 'Dockerfile'
    required: false
  context:
    description: 'Docker build context'
    default: '.'
    required: false
  branch_name:
    description: 'Git branch name for image tag'
    required: true

outputs:
  image_tag:
    description: 'Generated image tag (timestamp)'
    value: ${{ steps.calculate.outputs.image_tag }}
  image_name_tag:
    description: 'Full image name with tag'
    value: ${{ steps.calculate.outputs.image_name_tag }}
  image_with_repo:
    description: 'Full image with registry (repo/image:tag)'
    value: ${{ steps.calculate.outputs.image_with_repo }}

runs:
  using: 'composite'
  steps:
    - name: Get current time
      uses: 1466587594/get-current-time@v2
      id: current-time
      with:
        format: YYYYMMDDHHmmss
        utcOffset: "-03:00"

    - name: Login to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ inputs.docker_repo_user }}
        password: ${{ inputs.docker_repo_password }}

    - name: Calculate image tag
      id: calculate
      shell: bash
      env:
        F_TIME: ${{ steps.current-time.outputs.formattedTime }}
        BRANCH: ${{ inputs.branch_name }}
      run: |
        SAFE_BRANCH="${BRANCH/\//-}"
        if [[ "$SAFE_BRANCH" == "main" ]]; then
          IMAGE_TAG="$F_TIME"
        else
          IMAGE_TAG="$F_TIME-$SAFE_BRANCH"
        fi
        echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "image_name_tag=${{ inputs.image_name }}:$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "image_with_repo=${{ inputs.docker_repo_user }}/${{ inputs.image_name }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Build Docker image
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image_name }}
        DOCKER_REPO_USER: ${{ inputs.docker_repo_user }}
        DOCKERFILE: ${{ inputs.dockerfile_path }}
        CONTEXT: ${{ inputs.context }}
      run: |
        docker build -f "$DOCKERFILE" -t "$DOCKER_REPO_USER/$IMAGE_NAME:latest" "$CONTEXT"

    - name: Tag image with timestamp
      shell: bash
      env:
        DOCKER_REPO_USER: ${{ inputs.docker_repo_user }}
        IMAGE_NAME: ${{ inputs.image_name }}
        IMAGE_TAG: ${{ steps.calculate.outputs.image_tag }}
      run: |
        docker tag "$DOCKER_REPO_USER/$IMAGE_NAME:latest" "$DOCKER_REPO_USER/$IMAGE_NAME:$IMAGE_TAG"

    - name: Push image to registry
      shell: bash
      env:
        DOCKER_REPO_USER: ${{ inputs.docker_repo_user }}
        IMAGE_NAME: ${{ inputs.image_name }}
        IMAGE_TAG: ${{ steps.calculate.outputs.image_tag }}
      run: |
        docker push "$DOCKER_REPO_USER/$IMAGE_NAME:latest"
        docker push "$DOCKER_REPO_USER/$IMAGE_NAME:$IMAGE_TAG"
